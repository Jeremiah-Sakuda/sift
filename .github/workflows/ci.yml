name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Test
        run: npm test

      - name: Build (chrome)
        run: npm run build

      - name: Build (firefox)
        run: npm run build:firefox
